<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Facturación - ALQUIPC</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>💻 ALQUIPC</h1>
            <p>Sistema de Facturación - Alquiler de Equipos de Cómputo</p>
            <p class="price-info">$35.000 por equipo/día</p>
        </header>

        <form id="billingForm">
            <div class="form-group">
                <label for="modalidad">Modalidad de Alquiler:</label>
                <select id="modalidad" required>
                    <option value="1">Dentro de la ciudad</option>
                    <option value="2">Fuera de la ciudad (+5% domicilio)</option>
                    <option value="3">En el establecimiento (-5% descuento)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="equipos">Número de Equipos (Mínimo 2):</label>
                <input type="number" id="equipos" min="2" value="2" required>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label for="diasIniciales">Días Iniciales:</label>
                    <input type="number" id="diasIniciales" min="1" value="1" required>
                </div>
                <div class="form-group">
                    <label for="diasAdicionales">Días Adicionales:</label>
                    <input type="number" id="diasAdicionales" min="0" value="0">
                    <small>-2% por día adicional</small>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Correo del Cliente:</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>

            <button type="button" id="btnCalcular">📄 Generar Factura Digital</button>
        </form>

        <div id="factura" class="invoice-box hidden">
            <h3>Factura Digital Generada</h3>
            <div id="detalleFactura"></div>
            <div class="total-section">
                <p><strong>Total a Pagar:</strong> <span id="totalFinal"></span></p>
            </div>
            <p class="eco-friendly">🍃 Gracias por ayudar al planeta. Factura enviada por E-mail.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
