<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Facturación - ALQUIPC</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>ALQUIPC</h1>
            <p class="price-info">$35.000 por equipo al día</p>
        </header>
        <form id="billingForm">
            <div class="form-group">
                <label for="modalidad">Modalidad de Alquiler:</label>
                <select id="modalidad" required>
                    
                    <option value="1">Dentro de la ciudad</option>
                    <option value="2">Fuera de la ciudad </option>
                    <option value="3">En el establecimiento </option>
                </select>
            </div>

            <div class="form-group">
                <label for="equipos">Número de equipos mínimo 2:</label>
                <input type="number" id="equipos" min="2" value="2" required>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label for="diasIniciales">Días Iniciales:</label>
                    <input type="number" id="diasIniciales" min="1" step="1" value="1" required>
                </div>
                <div class="form-group">
                    <label for="diasAdicionales">Días Adicionales:</label>
                    <input type="number" id="diasAdicionales" min="0" step="1" value="0">
                </div>
            </div>

            <div class="form-group">
                <label for="nombreCliente">Nombre del Cliente:</label>
                <input type="text" id="nombreCliente" placeholder="" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]+" required>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono del Cliente:</label>
                <input type="tel" id="telefono" placeholder="" inputmode="numeric" pattern="[0-9]+" required>
            </div>

            <div class="form-group">
                <label for="email">Correo del Cliente:</label>
                <input type="email" id="email" placeholder="" required>
            </div>
            <br>
            <button type="button" id="btnCalcular">Generar Factura Digital</button>
        </form>

        <div id="factura" class="invoice-box hidden">
            <h3>Factura Digital Generada</h3>
            <div id="detalleFactura"></div>
            <div class="total-section">
                <p><strong>Total a Pagar:</strong> <span id="totalFinal"></span></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
